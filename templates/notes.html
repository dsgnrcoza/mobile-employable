{% extends "base.html" %}
{% block title %}Notes — Employable{% endblock %}
{% block content %}
<div class="notes-shell">
  <header class="stub-header">
    <a href="{{ url_for('dashboard') }}" class="stub-back-btn" aria-label="Back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </a>
    <span class="stub-header-title">Notes</span>
    <button type="button" class="notes-new-btn" id="notes-new-btn" aria-label="New note">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </header>

  <div class="notes-empty" id="notes-empty" hidden>
    <p>No notes yet — tap + to add one.</p>
  </div>

  <div class="notes-grid" id="notes-grid"></div>
</div>

<div class="note-editor-overlay" id="note-editor-overlay" hidden>
  <div class="note-editor-sheet">
    <div class="note-editor-header">
      <button type="button" class="stub-back-btn" id="note-editor-close-btn" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="note-editor-colors" id="note-editor-colors">
        <button type="button" class="note-color-swatch" data-color="default" aria-label="Default color"></button>
        <button type="button" class="note-color-swatch" data-color="teal" aria-label="Teal"></button>
        <button type="button" class="note-color-swatch" data-color="pink" aria-label="Pink"></button>
        <button type="button" class="note-color-swatch" data-color="purple" aria-label="Purple"></button>
        <button type="button" class="note-color-swatch" data-color="amber" aria-label="Amber"></button>
        <button type="button" class="note-color-swatch" data-color="blue" aria-label="Blue"></button>
      </div>
      <button type="button" class="note-editor-delete-btn" id="note-editor-delete-btn" aria-label="Delete note" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>
    </div>
    <input type="text" id="note-title-input" class="note-title-input" placeholder="Title" autocomplete="off">
    <textarea id="note-body-input" class="note-body-input" placeholder="Note"></textarea>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/notes.js') }}"></script>
{% endblock %}
