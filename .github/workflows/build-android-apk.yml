name: Build Android APK

# Builds the android/ Trusted Web Activity project and publishes the
# signed release APK as a stable download at
# github.com/<owner>/<repo>/releases/download/android-latest/employable.apk
#
# This can't run locally in most dev setups (needs the full Android SDK
# + build-tools), which is exactly why it lives here instead: GitHub's
# runners have that toolchain preinstalled, so no one has to install it
# themselves just to get an updated APK out.
on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/build-android-apk.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "${{ runner.temp }}/employable-release.jks"

      - name: Generate Gradle wrapper
        # Pins an explicit, known-compatible Gradle version instead of
        # trusting whatever the runner image happens to have installed
        # (which can silently drift out of sync with the Android Gradle
        # Plugin version in android/build.gradle over time).
        run: |
          cd android
          gradle wrapper --gradle-version 8.7 --distribution-type bin

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/employable-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew :app:assembleRelease --no-daemon

      - name: Rename APK for a stable download filename
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk dist/employable.apk

      - name: Publish as a stable release download
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: "Employable — latest Android build"
          body: "Auto-built from ${{ github.sha }}. Always the current Android app — download link never changes."
          files: dist/employable.apk
          make_latest: false
