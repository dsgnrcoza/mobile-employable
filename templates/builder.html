{% extends "base.html" %}
{% block title %}Builder — Employable{% endblock %}
{% block content %}
<div class="builder-shell">
  <header class="stub-header">
    <a href="{{ url_for('dashboard') }}" class="stub-back-btn" aria-label="Back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </a>
    <span class="stub-header-title">Builder</span>
    <span class="stub-header-spacer"></span>
  </header>

  <div class="builder-type-row">
    <button type="button" class="builder-type-block is-selected" id="builder-type-cv" data-type="cv">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h13l3 3v13H4Z"/><path d="M17 4v6h6"/><line x1="7.5" y1="12" x2="16" y2="12"/><line x1="7.5" y1="15.5" x2="16" y2="15.5"/><line x1="7.5" y1="19" x2="12.5" y2="19"/></svg>
      <span>CV Templates</span>
    </button>
    <button type="button" class="builder-type-block" id="builder-type-letter" data-type="letter">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
      <span>Letter Templates</span>
    </button>
  </div>

  <div class="builder-template-row" id="builder-template-row-cv">
    <button type="button" class="builder-template-chip is-selected" data-template="Modern">Modern</button>
    <button type="button" class="builder-template-chip" data-template="Classic">Classic</button>
    <button type="button" class="builder-template-chip" data-template="Minimal">Minimal</button>
  </div>
  <div class="builder-template-row" id="builder-template-row-letter" hidden>
    <button type="button" class="builder-template-chip is-selected" data-template="Formal">Formal</button>
    <button type="button" class="builder-template-chip" data-template="Warm">Warm</button>
    <button type="button" class="builder-template-chip" data-template="Direct">Direct</button>
  </div>

  <div class="builder-instruction-row">
    <textarea id="builder-instruction-input" class="builder-instruction-input" placeholder="What should we focus on? e.g. a role title, tone, or key points to include…"></textarea>
    <button type="button" class="btn btn-gold" id="builder-generate-btn">Generate</button>
  </div>

  <p class="builder-status-line" id="builder-status-line" hidden></p>

  <div class="builder-preview-empty" id="builder-preview-empty">
    <p>Pick a template above and hit Generate — we'll draft it from your uploaded documents.</p>
  </div>

  <div class="builder-preview-wrap" id="builder-preview-wrap" hidden>
    <div class="builder-preview" id="builder-preview"></div>
    <div class="builder-actions">
      <button type="button" class="btn btn-ghost" id="builder-copy-btn">Copy text</button>
      <button type="button" class="btn btn-ghost" id="builder-download-btn">Download PDF</button>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/builder.js') }}"></script>
{% endblock %}
