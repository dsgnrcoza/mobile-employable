<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Avryn{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v={{ asset_version }}">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <link rel="icon" href="{{ url_for('static', filename='icons/icon-192.png') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192.png') }}">
  <meta name="theme-color" content="#0E1013" id="theme-color-meta">
  {% block extra_head %}{% endblock %}
</head>
<body>
  {% block content %}{% endblock %}

  {% block extra_scripts %}{% endblock %}

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        // Registered from the site root (not /static/sw.js) so its scope
        // is "/" — a service worker's scope is capped at the directory
        // it's served from, so registering it under /static/ would only
        // ever let it control /static/* pages, never /dashboard, which
        // silently fails the PWA install-eligibility check that
        // beforeinstallprompt depends on.
        navigator.serviceWorker.register("/sw.js", { scope: "/" }).catch(function () {});

        // One-time cleanup: an earlier version of this script registered
        // the worker from /static/sw.js (scope stuck at /static/, unable
        // to ever control the app pages) — drop that stale registration
        // wherever it's still hanging around from a previous visit.
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (reg) {
            if (reg.scope.indexOf("/static/") !== -1) reg.unregister();
          });
        });
      });
    }
  </script>
</body>
</html>
