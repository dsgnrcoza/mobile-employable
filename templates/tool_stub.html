{% extends "base.html" %}
{% block title %}{{ tool.title }} — Employable{% endblock %}
{% block content %}
<div class="stub-shell">
  <header class="stub-header">
    <a href="{{ url_for('dashboard') }}" class="stub-back-btn" aria-label="Back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </a>
    <span class="stub-header-title">{{ tool.title }}</span>
    <span class="stub-header-spacer"></span>
  </header>
  <div class="stub-body">
    <div class="stub-icon">
      {% if tool_name == "qualify" %}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/></svg>
      {% endif %}
    </div>
    <p class="stub-blurb">{{ tool.blurb }}</p>
  </div>
</div>
{% endblock %}
