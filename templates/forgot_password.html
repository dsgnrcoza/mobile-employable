{% extends "base.html" %}
{% block title %}Forgot Password — Employable{% endblock %}
{% block content %}
<div class="auth-shell">
  <div class="auth-card">
  <div class="auth-visual">
    <div class="auth-wordmark">Employable<span class="dot">.</span></div>
    <h1 class="auth-headline">Forgotten passwords happen to <em>everyone</em>.</h1>
  </div>
  <div class="auth-form-side">
    <div class="auth-form-box">
      <h1>Reset your password</h1>
      <span class="sub" id="step-sub">Enter your username to find your security question.</span>

      <div id="flash-area"></div>

      <!-- Step 1: username -->
      <div id="step-1">
        <div class="field">
          <label for="fp-username">Username</label>
          <input type="text" id="fp-username" placeholder="Your username" required>
        </div>
        <button type="button" class="btn btn-gold btn-block" id="find-question-btn">Find My Account</button>
      </div>

      <!-- Step 2: security question + new password (hidden until step 1 succeeds) -->
      <div id="step-2" style="display:none;">
        <div class="field">
          <label id="fp-question-label">Security Question</label>
          <input type="text" id="fp-answer" placeholder="Your answer" required>
        </div>
        <div class="field">
          <label for="fp-new-password">New Password</label>
          <input type="password" id="fp-new-password" placeholder="At least 8 characters" required minlength="8">
        </div>
        <div class="field">
          <label for="fp-confirm-password">Confirm New Password</label>
          <input type="password" id="fp-confirm-password" placeholder="Re-enter new password" required minlength="8">
        </div>
        <button type="button" class="btn btn-gold btn-block" id="reset-btn">Reset Password</button>
      </div>

      <div class="auth-switch"><a href="{{ url_for('login_page') }}">Back to Sign In</a></div>
    </div>
  </div>
</div>
</div>

<script>
let currentUsername = "";

function showFlash(message, type) {
  const area = document.getElementById("flash-area");
  area.innerHTML = `<div class="flash flash-${type}">${message}</div>`;
}

document.getElementById("find-question-btn").addEventListener("click", async () => {
  const username = document.getElementById("fp-username").value.trim();
  if (!username) { showFlash("Please enter your username.", "error"); return; }

  const res = await fetch("{{ url_for('api_security_question') }}", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username })
  });
  const data = await res.json();

  if (!data.ok) {
    showFlash(data.error || "Account not found.", "error");
    return;
  }

  currentUsername = username;
  document.getElementById("fp-question-label").textContent = data.question;
  document.getElementById("step-1").style.display = "none";
  document.getElementById("step-2").style.display = "block";
  document.getElementById("step-sub").textContent = "Answer your security question to set a new password.";
  document.getElementById("flash-area").innerHTML = "";
});

document.getElementById("reset-btn").addEventListener("click", async () => {
  const security_answer = document.getElementById("fp-answer").value;
  const new_password = document.getElementById("fp-new-password").value;
  const confirm_password = document.getElementById("fp-confirm-password").value;

  const res = await fetch("{{ url_for('api_reset_password') }}", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username: currentUsername, security_answer, new_password, confirm_password })
  });
  const data = await res.json();

  if (!data.ok) {
    showFlash(data.error || "Could not reset password.", "error");
    return;
  }

  showFlash("Password reset. Redirecting to sign in…", "success");
  setTimeout(() => { window.location.href = "{{ url_for('login_page') }}"; }, 1400);
});
</script>
{% endblock %}
