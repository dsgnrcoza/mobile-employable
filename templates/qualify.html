{% extends "base.html" %}
{% block title %}Qualify — Employable{% endblock %}
{% block content %}
<div class="qualify-shell">
  <header class="stub-header">
    <a href="{{ url_for('dashboard') }}" class="stub-back-btn" aria-label="Back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </a>
    <span class="stub-header-title">Qualify</span>
    <span class="stub-header-spacer"></span>
  </header>

  <div class="qualify-upload-block" id="qualify-upload-block" {% if has_documents %}hidden{% endif %}>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 9 12 4 17 9"/><line x1="12" y1="4" x2="12" y2="15"/></svg>
    <p>Upload your CV so we can check whether you qualify for a role.</p>
    <button type="button" class="btn btn-gold" id="qualify-upload-btn">Upload document</button>
    <input type="file" id="qualify-upload-input" accept=".pdf,.doc,.docx,.txt" multiple hidden>
    <p class="qualify-upload-status" id="qualify-upload-status" hidden></p>
  </div>

  <div class="qualify-form-block" id="qualify-form-block" {% if not has_documents %}hidden{% endif %}>
    <input type="text" id="qualify-job-title-input" class="tracker-field-input" placeholder="Job title you're considering" autocomplete="off">
    <input type="text" id="qualify-salary-input" class="tracker-field-input" placeholder="Salary expectation (optional)" autocomplete="off">
    <input type="text" id="qualify-location-input" class="tracker-field-input" placeholder="Location (optional)" autocomplete="off">
    <button type="button" class="btn btn-gold" id="qualify-check-btn">Check my fit</button>

    <div class="qualify-result" id="qualify-result" hidden>
      <span class="qualify-verdict-badge" id="qualify-verdict-badge"></span>
      <p class="qualify-headline" id="qualify-headline"></p>
      <div class="qualify-section">
        <h3>Why</h3>
        <p id="qualify-reasoning"></p>
      </div>
      <div class="qualify-section">
        <h3 id="qualify-next-steps-title">Next steps</h3>
        <p id="qualify-next-steps"></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/qualify.js') }}"></script>
{% endblock %}
